# Deployt NUR die öffentlichen Website-Dateien zu GitHub Pages.
# Interne Unterlagen (ANWEISUNGEN/, .github/, künftige Notizen) bleiben
# bewusst außen vor — Whitelist statt Blacklist.
name: Website zu GitHub Pages deployen

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Öffentliche Dateien zusammenstellen (Whitelist)
        run: |
          mkdir -p _site
          cp index.html favicon.ico favicon-32.png favicon-16.png apple-touch-icon.png robots.txt sitemap.xml CNAME .nojekyll _site/
          cp -r assets produkte rechtliches _site/
          # docs/ nur mitnehmen, wenn vorhanden (künftige COA/SDB-PDFs)
          if [ -d docs ]; then cp -r docs _site/; fi
          # Brand-Quelldatei (6 MB) nicht ausliefern
          rm -f _site/assets/img/siegel-original.png _site/assets/img/siegel.png _site/assets/img/siegel-hell-512.png

      - name: Cache-Busting (CSS/JS mit Commit-Kennung versionieren)
        run: |
          V="${GITHUB_SHA::8}"
          find _site -name "*.html" -exec sed -i \
            -e "s|assets/css/style\.css|assets/css/style.css?v=${V}|g" \
            -e "s|assets/js/main\.js|assets/js/main.js?v=${V}|g" {} +

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
